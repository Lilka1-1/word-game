<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Игра "Объясни слово"</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 800px;
            width: 100%;
            padding: 30px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
            animation: slideIn 0.5s ease-out;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-block;
            text-decoration: none;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-small {
            padding: 8px 20px;
            font-size: 14px;
        }

        .btn-danger {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .btn-success {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .room-code {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 5px;
            color: #667eea;
            margin: 20px 0;
            cursor: pointer;
            transition: all 0.3s;
        }

        .room-code:hover {
            background: #e8e8e8;
        }

        .players-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin: 20px 0;
        }

        .player-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            transition: all 0.3s;
        }

        .player-card.explaining {
            animation: pulse 2s infinite;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .player-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .game-area {
            background: #f9f9f9;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
        }

        .timer {
            text-align: center;
            margin: 20px 0;
        }

        .timer-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 5px solid #667eea;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
            transition: all 0.3s;
        }

        .timer-circle.warning {
            border-color: #f5576c;
            color: #f5576c;
            animation: pulse 1s infinite;
        }

        .phrase-display {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            color: #333;
            margin: 20px 0;
            border: 3px dashed #667eea;
        }

        .chat-area {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
            max-height: 300px;
            overflow-y: auto;
        }

        .chat-message {
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 10px;
            background: #f0f0f0;
        }

        .chat-message.correct {
            background: #d4edda;
            border-left: 4px solid #28a745;
        }

        .chat-input-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .chat-input-group input {
            flex: 1;
        }

        .score-board {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
        }

        .score-item {
            text-align: center;
        }

        .score-value {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
        }

        .winner-animation {
            animation: pulse 0.5s infinite;
            font-size: 32px;
            color: #f5576c;
        }

        .alert {
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
        }

        .alert-warning {
            background: #fff3cd;
            color: #856404;
        }

        .copy-tooltip {
            position: relative;
            display: inline-block;
        }

        .copy-tooltip .tooltip-text {
            visibility: hidden;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 6px;
            padding: 5px 10px;
            position: absolute;
            z-index: 1;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            white-space: nowrap;
        }

        .copy-tooltip:hover .tooltip-text {
            visibility: visible;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-value {
            font-size: 36px;
            font-weight: bold;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }

        @media (max-width: 600px) {
            .container {
                padding: 15px;
                margin: 10px;
            }
            
            h1 {
                font-size: 1.8em;
            }
            
            .players-list {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            }
            
            .phrase-display {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Объясни слово</h1>
        
        <!-- Главное меню -->
        <div id="menuScreen" class="screen active">
            <button class="btn" onclick="showScreen('createScreen')" style="width: 100%; margin-bottom: 10px;">
                🏠 Создать комнату
            </button>
            <button class="btn" onclick="showScreen('joinScreen')" style="width: 100%; margin-bottom: 10px;">
                🚪 Присоединиться
            </button>
            <button class="btn btn-success" onclick="showScreen('statsScreen')" style="width: 100%;">
                📊 Статистика
            </button>
        </div>

        <!-- Создание комнаты -->
        <div id="createScreen" class="screen">
            <h2>Создание комнаты</h2>
            <div class="input-group">
                <label>Ваш никнейм:</label>
                <input type="text" id="createNickname" placeholder="Введите никнейм" maxlength="20">
            </div>
            <div class="input-group">
                <label>Категория:</label>
                <select id="createCategory">
                    <option value="Смешанная">🎲 Смешанная</option>
                    <option value="Животные">🐾 Животные</option>
                    <option value="Профессии">👔 Профессии</option>
                    <option value="Еда">🍕 Еда</option>
                    <option value="Спорт">⚽ Спорт</option>
                </select>
            </div>
            <div class="input-group">
                <label>Количество раундов:</label>
                <select id="createRounds">
                    <option value="5">5 раундов</option>
                    <option value="10" selected>10 раундов</option>
                    <option value="15">15 раундов</option>
                    <option value="20">20 раундов</option>
                </select>
            </div>
            <div class="input-group">
                <label>Время на раунд (сек):</label>
                <select id="createTimer">
                    <option value="30">30 секунд</option>
                    <option value="45">45 секунд</option>
                    <option value="60" selected>60 секунд</option>
                    <option value="90">90 секунд</option>
                </select>
            </div>
            <button class="btn" onclick="createRoom()" style="width: 100%;">Создать</button>
            <button class="btn btn-small" onclick="showScreen('menuScreen')" style="width: 100%; margin-top: 10px;">
                ← Назад
            </button>
        </div>

        <!-- Присоединение к комнате -->
        <div id="joinScreen" class="screen">
            <h2>Присоединиться к комнате</h2>
            <div class="input-group">
                <label>Ваш никнейм:</label>
                <input type="text" id="joinNickname" placeholder="Введите никнейм" maxlength="20">
            </div>
            <div class="input-group">
                <label>Код комнаты:</label>
                <input type="text" id="joinRoomCode" placeholder="Введите 6-значный код" maxlength="6">
            </div>
            <button class="btn" onclick="joinRoom()" style="width: 100%;">Присоединиться</button>
            <button class="btn btn-small" onclick="showScreen('menuScreen')" style="width: 100%; margin-top: 10px;">
                ← Назад
            </button>
        </div>

        <!-- Лобби -->
        <div id="lobbyScreen" class="screen">
            <h2>Лобби комнаты</h2>
            <div class="room-code" onclick="copyRoomCode()">
                <span id="lobbyRoomCode">------</span>
                <div class="copy-tooltip">
                    <span class="tooltip-text">Нажмите, чтобы скопировать</span>
                </div>
            </div>
            <div class="alert alert-info" id="copyAlert">
                ✅ Код скопирован! Отправьте его друзьям.
            </div>
            <div id="lobbyInfo" style="margin: 10px 0; color: #666;"></div>
            <h3>Игроки:</h3>
            <div class="players-list" id="lobbyPlayers"></div>
            <button class="btn btn-success" id="startGameBtn" onclick="startGame()" style="width: 100%; margin-top: 20px;" disabled>
                🎯 Начать игру (минимум 2 игрока)
            </button>
            <button class="btn btn-small btn-danger" onclick="leaveRoom()" style="width: 100%; margin-top: 10px;">
                🚪 Покинуть комнату
            </button>
        </div>

        <!-- Игровой экран -->
        <div id="gameScreen" class="screen">
            <div class="game-area">
                <div id="roundInfo" style="text-align: center; font-size: 18px; color: #666; margin-bottom: 15px;"></div>
                
                <div class="timer">
                    <div class="timer-circle" id="timerDisplay">60</div>
                </div>
                
                <div id="explainerInfo" style="text-align: center; margin: 10px 0; font-size: 16px;"></div>
                
                <div class="phrase-display" id="phraseDisplay" style="display: none;">
                    📝 <span id="currentPhrase"></span>
                    <div style="font-size: 14px; color: #999; margin-top: 5px;">
                        Сложность: <span id="phraseDifficulty">★☆☆</span>
                    </div>
                </div>
                
                <div class="score-board" id="scoreBoard"></div>
                
                <div class="chat-area" id="chatMessages"></div>
                
                <div class="chat-input-group">
                    <input type="text" id="chatInput" placeholder="Введите вашу догадку..." onkeypress="handleChatKeyPress(event)">
                    <button class="btn btn-small" onclick="sendChatMessage()">📤</button>
                    <button class="btn btn-small btn-success" onclick="voteWord(true)" id="voteBtn" style="display: none;">
                        ✅ Угадал!
                    </button>
                </div>
            </div>
        </div>

        <!-- Конец игры -->
        <div id="endScreen" class="screen">
            <h2 style="text-align: center;">🏆 Игра окончена!</h2>
            <div id="winnerDisplay" style="text-align: center; margin: 20px 0;"></div>
            <div class="score-board" id="finalScores"></div>
            <button class="btn" onclick="location.reload()" style="width: 100%; margin-top: 20px;">
                🎮 Новая игра
            </button>
        </div>

        <!-- Статистика -->
        <div id="statsScreen" class="screen">
            <h2>📊 Статистика сервера</h2>
            <div class="stats-grid" id="statsData">
                <div class="stat-card">
                    <div class="stat-value">...</div>
                    <div class="stat-label">Загрузка...</div>
                </div>
            </div>
            <button class="btn btn-small" onclick="showScreen('menuScreen')" style="width: 100%; margin-top: 20px;">
                ← Назад
            </button>
        </div>
    </div>

    <audio id="tickSound" preload="auto">
        <source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=" type="audio/wav">
    </audio>

    <script>
        let ws = null;
        let currentPlayerId = null;
        let currentRoomCode = null;
        let isExplaining = false;
        let gameData = {
            players: [],
            currentRound: 0,
            maxRounds: 0,
            timerSeconds: 60
        };

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            
            if (screenId === 'statsScreen') {
                loadStats();
            }
        }

        async function createRoom() {
            const nickname = document.getElementById('createNickname').value.trim();
            if (!nickname) {
                alert('Введите никнейм!');
                return;
            }

            const data = {
                host_nickname: nickname,
                max_rounds: parseInt(document.getElementById('createRounds').value),
                category: document.getElementById('createCategory').value,
                timer_seconds: parseInt(document.getElementById('createTimer').value)
            };

            try {
                const response = await fetch('/api/rooms/create', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                
                if (!response.ok) throw new Error('Ошибка создания комнаты');
                
                const result = await response.json();
                currentPlayerId = result.player_id;
                currentRoomCode = result.room_code;
                
                connectWebSocket();
                showScreen('lobbyScreen');
                updateLobby();
            } catch (error) {
                alert('Ошибка: ' + error.message);
            }
        }

        async function joinRoom() {
            const nickname = document.getElementById('joinNickname').value.trim();
            const roomCode = document.getElementById('joinRoomCode').value.trim();
            
            if (!nickname || !roomCode) {
                alert('Заполните все поля!');
                return;
            }

            try {
                const response = await fetch('/api/rooms/join', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({nickname, room_code: roomCode})
                });
                
                if (!response.ok) throw new Error('Комната не найдена');
                
                const result = await response.json();
                currentPlayerId = result.player_id;
                currentRoomCode = roomCode;
                
                connectWebSocket();
                showScreen('lobbyScreen');
                updateLobby();
            } catch (error) {
                alert('Ошибка: ' + error.message);
            }
        }

        function connectWebSocket() {
            if (ws) ws.close();
            
           const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
           ws = new WebSocket(`${protocol}//${window.location.host}/ws/${currentRoomCode}/${currentPlayerId}`);
            
            ws.onopen = () => {
                console.log('✅ WebSocket подключен');
            };
            
            ws.onmessage = (event) => {
                const message = JSON.parse(event.data);
                handleGameMessage(message);
            };
            
            ws.onerror = (error) => {
                console.error('❌ WebSocket ошибка:', error);
            };
            
            ws.onclose = () => {
                console.log('🔒 WebSocket закрыт');
            };
        }

        function handleGameMessage(message) {
            console.log('📨 Получено сообщение:', message);
            
            switch(message.type) {
                case 'player_joined':
                case 'player_left':
                    updateLobby();
                    break;
                    
                case 'player_ready':
                    updateLobby();
                    break;
                    
                case 'game_starting':
                    gameData.currentRound = message.data.current_round;
                    gameData.maxRounds = message.data.max_rounds;
                    gameData.timerSeconds = message.data.timer_seconds;
                    startGameScreen(message.data);
                    break;
                    
                case 'new_round':
                    gameData.currentRound = message.data.round;
                    updateRoundInfo(message.data);
                    document.getElementById('phraseDisplay').style.display = 'none';
                    document.getElementById('voteBtn').style.display = 'none';
                    break;
                    
                case 'new_phrase':
                    document.getElementById('phraseDisplay').style.display = 'block';
                    document.getElementById('currentPhrase').textContent = message.data.phrase;
                    
                    const difficulty = message.data.difficulty || 1;
                    document.getElementById('phraseDifficulty').textContent = 
                        '★'.repeat(difficulty) + '☆'.repeat(3 - difficulty);
                    
                    isExplaining = true;
                    document.getElementById('voteBtn').style.display = 'none';
                    break;
                    
                case 'timer_update':
                    updateTimer(message.data.seconds, message.data.total);
                    break;
                    
                case 'chat_message':
                    addChatMessage(message.data.message, message.data.player_id);
                    break;
                    
                case 'score_update':
                    updateScoreBoard(message.data.scores);
                    break;
                    
                case 'word_guessed':
                    addChatMessage(`✅ Угадано: ${message.data.phrase}`, null, true);
                    break;
                    
                case 'round_end':
                    updateLobby();
                    break;
                    
                case 'game_end':
                    showEndScreen(message.data);
                    break;
            }
        }

        function startGameScreen(data) {
            showScreen('gameScreen');
            document.getElementById('phraseDisplay').style.display = 'none';
            
            const explainer = data.explainer;
            document.getElementById('explainerInfo').innerHTML = 
                `🎯 Объясняет: <strong>${explainer.nickname}</strong>`;
            
            document.getElementById('roundInfo').textContent = 
                `Раунд ${gameData.currentRound} из ${gameData.maxRounds}`;
            
            if (explainer.id === currentPlayerId) {
                document.getElementById('voteBtn').style.display = 'none';
            } else {
                document.getElementById('voteBtn').style.display = 'inline-block';
            }
        }

        function updateRoundInfo(data) {
            document.getElementById('roundInfo').textContent = 
                `Раунд ${data.round} из ${gameData.maxRounds}`;
            
            const explainer = data.explainer;
            document.getElementById('explainerInfo').innerHTML = 
                `🎯 Объясняет: <strong>${explainer.nickname}</strong>`;
            
            if (explainer.id === currentPlayerId) {
                document.getElementById('voteBtn').style.display = 'none';
            } else {
                document.getElementById('voteBtn').style.display = 'inline-block';
            }
        }

        function updateTimer(seconds, total) {
            const timerDisplay = document.getElementById('timerDisplay');
            timerDisplay.textContent = seconds;
            
            if (seconds <= 10) {
                timerDisplay.parentElement.classList.add('warning');
            } else {
                timerDisplay.parentElement.classList.remove('warning');
            }
        }

        function addChatMessage(message, playerId, isCorrect = false) {
            const chatArea = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'chat-message' + (isCorrect ? ' correct' : '');
            
            if (playerId) {
                const player = gameData.players.find(p => p.id === playerId);
                const nickname = player ? player.nickname : 'Игрок';
                messageDiv.innerHTML = `<strong>${nickname}:</strong> ${message}`;
            } else {
                messageDiv.textContent = message;
            }
            
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            if (message && ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'chat',
                    data: { message }
                }));
                input.value = '';
            }
        }

        function handleChatKeyPress(event) {
            if (event.key === 'Enter') {
                sendChatMessage();
            }
        }

        function voteWord(guessed) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'vote',
                    data: { word_guessed: guessed }
                }));
            }
        }

        function updateScoreBoard(scores) {
            const scoreBoard = document.getElementById('scoreBoard');
            scoreBoard.innerHTML = '';
            
            Object.entries(scores).forEach(([playerId, score]) => {
                const player = gameData.players.find(p => p.id === parseInt(playerId));
                if (player) {
                    scoreBoard.innerHTML += `
                        <div class="score-item">
                            <div style="color: ${player.avatar_color}">${player.nickname}</div>
                            <div class="score-value">${score}</div>
                        </div>
                    `;
                }
            });
        }

        function startGame() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({type: 'start_game'}));
            }
        }

        async function updateLobby() {
            try {
                const response = await fetch('/api/rooms/${currentRoomCode}`);
                const data = await response.json();
                
                gameData.players = data.players;
                
                document.getElementById('lobbyRoomCode').textContent = currentRoomCode;
                document.getElementById('lobbyInfo').innerHTML = 
                    `Категория: ${data.category} | Раундов: ${data.max_rounds} | Время: ${data.timer_seconds} сек`;
                
                const playersList = document.getElementById('lobbyPlayers');
                playersList.innerHTML = '';
                
                data.players.forEach(player => {
                    const isExplaining = player.is_explaining ? ' explaining' : '';
                    playersList.innerHTML += `
                        <div class="player-card${isExplaining}">
                            <div class="player-avatar" style="background: ${player.avatar_color}">
                                ${player.nickname[0].toUpperCase()}
                            </div>
                            <div><strong>${player.nickname}</strong></div>
                            <div style="font-size: 12px;">Счет: ${player.score}</div>
                            ${player.id === data.host_player_id ? '<div>👑 Хост</div>' : ''}
                        </div>
                    `;
                });
                
                const startBtn = document.getElementById('startGameBtn');
                startBtn.disabled = data.players.length < 2;
                if (data.players.length < 2) {
                    startBtn.textContent = '⏳ Ожидание игроков...';
                } else {
                    startBtn.textContent = '🎯 Начать игру!';
                }
            } catch (error) {
                console.error('Ошибка обновления лобби:', error);
            }
        }

        function showEndScreen(data) {
            showScreen('endScreen');
            
            document.getElementById('winnerDisplay').innerHTML = `
                <div class="winner-animation">
                    🏆 ${data.winner} победил! 🏆
                </div>
            `;
            
            const finalScores = document.getElementById('finalScores');
            finalScores.innerHTML = '';
            
            Object.entries(data.final_scores).forEach(([nickname, score]) => {
                finalScores.innerHTML += `
                    <div class="score-item">
                        <div>${nickname}</div>
                        <div class="score-value">${score}</div>
                    </div>
                `;
            });
        }

        function copyRoomCode() {
            navigator.clipboard.writeText(currentRoomCode).then(() => {
                const alert = document.getElementById('copyAlert');
                alert.classList.add('show');
                setTimeout(() => alert.classList.remove('show'), 2000);
            });
        }

        function leaveRoom() {
            if (ws) ws.close();
            showScreen('menuScreen');
        }

        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                
                document.getElementById('statsData').innerHTML = `
                    <div class="stat-card">
                        <div class="stat-value">${data.total_rooms}</div>
                        <div class="stat-label">Всего комнат</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${data.active_rooms}</div>
                        <div class="stat-label">Активных комнат</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${data.total_players}</div>
                        <div class="stat-label">Игроков было</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${data.categories.length}</div>
                        <div class="stat-label">Категорий</div>
                    </div>
                `;
            } catch (error) {
                console.error('Ошибка загрузки статистики:', error);
            }
        }

        // Обновление лобби каждые 3 секунды
        setInterval(() => {
            if (document.getElementById('lobbyScreen').classList.contains('active')) {
                updateLobby();
            }
        }, 3000);
    </script>
</body>
</html>
